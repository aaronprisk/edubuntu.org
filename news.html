<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Latest news and announcements from the Edubuntu project." />
        <meta name="author" content="" />
        <title>Edubuntu News</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Ubuntu" rel="stylesheet" />
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body id="page-top">
        <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
            <div class="container px-5">
                <a href="https://edubuntu.org/"><img class="navbar-brand" src="assets/img/edubuntu-logo.svg" width="160px"/></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Menu
                    <i class="bi-list"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                        <li class="nav-item"><a class="nav-link me-lg-3" href="https://edubuntu.org/">Home</a></li>
                        <li class="nav-item"><a class="nav-link me-lg-3 active" href="https://edubuntu.org/news.html">News</a></li>
                        <li class="nav-item"><a class="nav-link me-lg-3" href="https://edubuntu.org/team.html">Team</a></li>
                        <li class="nav-item"><a class="nav-link me-lg-3" href="https://edubuntu.org/download.html">Download</a></li>
                    </ul>
                    <a class="btn btn-primary rounded-pill px-3 mb-2 mb-lg-0" href="https://edubuntu.myspreadshop.com/" target="_blank">
                        <span class="d-flex align-items-center">
                            <i class="bi-shop me-2"></i>
                            <span class="small">Edubuntu Store</span>
                        </span>
                    </a>
                </div>
            </div>
        </nav>

        <header class="masthead">
            <div class="container px-5">
                <div class="row gx-5 align-items-center">
                    <div class="col-lg-9">
                        <div class="mb-5 mb-lg-0 text-center text-lg-start">
                            <h1 class="display-4 lh-1 mb-3">Edubuntu News</h1>
                            <p class="lead fw-normal text-muted mb-0">Project updates and announcements.</p>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <section id="news" class="news-section">
            <div class="container px-5">
                <div class="row gx-5 justify-content-center">
                    <div class="col-12">
                        <div id="news-loading" class="news-status text-muted">Loading news...</div>
                        <div id="news-list" class="news-list" aria-live="polite"></div>
                        <nav id="news-pagination" class="news-pagination" aria-label="News pagination"></nav>
                    </div>
                </div>
            </div>
        </section>

        <footer class="bg-black text-center py-5">
            <div class="container px-5">
                <div class="text-white-50 small">
                    <div class="mb-2">Edubuntu &copy; Canonical Ltd</div>
                    <span class="mx-1">Ubuntu is a trademark of Canonical Ltd and is used with the permission of Canonical Limited. Edubuntu is not affiliated with Canonical Ltd</span>
                </div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="js/scripts.js"></script>
    </body>
</html>
